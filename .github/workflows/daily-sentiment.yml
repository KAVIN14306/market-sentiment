name: Daily Market Sentiment Update

on:
  schedule:
    # 06:00 UTC = 11:30 AM IST — before the Indian market opens
    - cron: "0 2 * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-sentiment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch sentiment
        run: python fetch_sentiment.py

      - name: Commit updated sentiment.json
        run: |
          git config user.name "market-pulse-bot"
          git config user.email "actions@github.com"
          git add docs/sentiment.json
          git diff --staged --quiet || git commit -m "Daily sentiment update"
          git push
